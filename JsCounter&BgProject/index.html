<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Semantic Webpage</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section>
        <h2>Counter</h2>
        <p id="count">0</p>
        <button id="increaseBtn">Increase</button>
        <button id="decreaseBtn">Decrease</button>
      </section>

      <section>
        <h2>Change Background</h2>
        <button id="colorBtn">Change Background Color</button>
        <button onclick="alert('i am inline js ')">Click me</button>
      </section>

      <section>
        <h2>Increment by 5 (Internal JS)</h2>
        <p id="countFive">0</p>
        <button id="increaseFiveBtn">Increase by 5</button>
      </section>

      <section>
        <h2>Increment by 2 (Inline JS)</h2>
        <p id="countTwo">0</p>
        <button
          onclick="
            let value = document.getElementById('countTwo');
            value.textContent = Number(value.textContent) + 2;
          "
        >
          Increase by 2
        </button>
      </section>
    </main>

    <footer>
      <p>© 2026 My Website | All Rights Reserved</p>
    </footer>

    <script src="script.js"></script>

    <script>
      let countFive = 0;

      const countFiveDisplay = document.getElementById("countFive");
      const increaseFiveBtn = document.getElementById("increaseFiveBtn");

      increaseFiveBtn.addEventListener("click", function () {
        countFive += 5;
        countFiveDisplay.textContent = countFive;
      });
    </script>
  </body>
</html>
